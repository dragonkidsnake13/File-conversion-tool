<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="_jqr9km-odcdcNnUpSekm0fSmdFClwBKEyQMss2JF-Q" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate File Tools</title>

<meta name="description" content="Free online tool to convert images to PDF, PDF to images, compress images and enhance quality. Fast, secure, no upload required.">
<meta name="keywords" content="image to pdf, pdf to image, compress image, free pdf tools, online converter">

<link rel="manifest" href="manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
}
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    margin: 20px 0;
    border-radius: 15px;
}
.preview-box {
    display: none;
    margin-top: 10px;
    padding: 10px;
    border: 2px dashed #00ffd5;
    border-radius: 10px;
    text-align: center;
}
.preview-box img {
    max-width: 100%;
    max-height: 200px;
}
button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
.ad {
    margin: 20px 0;
    padding: 20px;
    background: #222;
    text-align: center;
}
.badge {
    background: green;
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Ultimate File Tools</h1>

<p>
All-in-one tool: convert images ↔ PDF, compress, enhance. 100% private (runs in browser).
</p>

<p class="badge">🔐 Files never leave your device</p>

<div class="ad">💰 Ad Space</div>

<p id="visits"></p>

<!-- IMAGE → PDF -->
<div class="card">
<h2>🖼️ Images → PDF</h2>
<input type="file" id="img" multiple accept="image/*">
<div class="preview-box" id="imgPreview"></div>
<button onclick="toPDF()">Convert</button>
<p id="s1"></p>
</div>

<!-- PDF → IMAGE -->
<div class="card">
<h2>📄 PDF → Images</h2>
<input type="file" id="pdf" accept="application/pdf">
<button onclick="toImg()">Convert</button>
<div id="out"></div>
</div>

<!-- COMPRESS -->
<div class="card">
<h2>📉 Compress</h2>
<input type="file" id="comp" accept="image/*">
<div class="preview-box" id="compPreview"></div>

<label>Quality: <span id="qVal">0.7</span></label>
<input type="range" id="q" min="0.1" max="1" step="0.1" value="0.7" oninput="qVal.innerText=this.value">

<button onclick="compress()">Compress</button>
<a id="dl"></a>
</div>

<!-- AI ENHANCER -->
<div class="card">
<h2>🤖 AI Image Enhancer</h2>
<input type="file" id="ai" accept="image/*">
<div class="preview-box" id="aiPreview"></div>
<button onclick="enhance()">Enhance</button>
<br><br>
<canvas id="aiCanvas"></canvas>
<br>
<a id="aiDownload"></a>
</div>

<div class="ad">💰 Ad Space</div>

<hr>
<p style="text-align:center;">
<a href="privacy.html">Privacy</a> |
<a href="terms.html">Terms</a> |
<a href="about.html">About</a> |
<a href="contact.html">Contact</a>
</p>

</div>

<script>
const { jsPDF } = window.jspdf;

// visits
let v = localStorage.getItem("visits") || 0;
localStorage.setItem("visits", ++v);
visits.innerText = "👀 Visitors: " + v;

// preview helper
function showPreview(input, boxId) {
    const box = document.getElementById(boxId);
    box.innerHTML = "";
    if (!input.files[0]) return;

    const img = document.createElement("img");
    img.src = URL.createObjectURL(input.files[0]);
    box.appendChild(img);
    box.style.display = "block";
}

img.onchange = () => showPreview(img, "imgPreview");
comp.onchange = () => showPreview(comp, "compPreview");
ai.onchange = () => showPreview(ai, "aiPreview");

// IMAGE → PDF (FULL FILL)
function toPDF() {
    let files = img.files;
    if (!files.length) return alert("Upload images");

    let pdf = new jsPDF();

    Array.from(files).forEach((file, i) => {
        let r = new FileReader();
        r.onload = e => {
            let image = new Image();
            image.src = e.target.result;

            image.onload = () => {
                const pw = pdf.internal.pageSize.getWidth();
                const ph = pdf.internal.pageSize.getHeight();

                const ratio = Math.max(pw / image.width, ph / image.height);

                const w = image.width * ratio;
                const h = image.height * ratio;

                const x = (pw - w) / 2;
                const y = (ph - h) / 2;

                if (i > 0) pdf.addPage();
                pdf.addImage(image, 'JPEG', x, y, w, h);

                if (i === files.length - 1) {
                    pdf.save("file.pdf");
                    s1.innerText = "Done ✅";
                }
            };
        };
        r.readAsDataURL(file);
    });
}

// PDF → IMAGE (WITH DOWNLOAD)
function toImg() {
    let file = pdf.files[0];
    if (!file) return alert("Upload PDF");

    let r = new FileReader();
    r.onload = function() {
        pdfjsLib.getDocument(new Uint8Array(this.result)).promise.then(pdfDoc => {
            out.innerHTML = "";

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                pdfDoc.getPage(i).then(page => {
                    let c = document.createElement("canvas");
                    let ctx = c.getContext("2d");
                    let vp = page.getViewport({ scale: 1.5 });

                    c.width = vp.width;
                    c.height = vp.height;

                    page.render({ canvasContext: ctx, viewport: vp });

                    let btn = document.createElement("button");
                    btn.innerText = "⬇ Download Page " + i;
                    btn.onclick = () => {
                        let link = document.createElement("a");
                        link.download = "page_" + i + ".png";
                        link.href = c.toDataURL();
                        link.click();
                    };

                    out.appendChild(c);
                    out.appendChild(btn);
                });
            }
        });
    };
    r.readAsArrayBuffer(file);
}

// COMPRESS
function compress() {
    let file = comp.files[0];
    if (!file) return alert("Upload image");

    let r = new FileReader();
    r.onload = e => {
        let img = new Image();
        img.src = e.target.result;

        img.onload = () => {
            let c = document.createElement("canvas");
            c.width = img.width;
            c.height = img.height;

            c.getContext("2d").drawImage(img, 0, 0);

            c.toBlob(blob => {
                let url = URL.createObjectURL(blob);
                dl.href = url;
                dl.download = "compressed.jpg";
                dl.innerText = "⬇ Download";
            }, "image/jpeg", q.value);
        };
    };
    r.readAsDataURL(file);
}

// AI ENHANCE + DOWNLOAD
function enhance() {
    let file = ai.files[0];
    if (!file) return alert("Upload image");

    let r = new FileReader();
    r.onload = e => {
        let img = new Image();
        img.src = e.target.result;

        img.onload = () => {
            let c = aiCanvas;
            let ctx = c.getContext("2d");

            c.width = img.width;
            c.height = img.height;

            ctx.drawImage(img, 0, 0);

            let d = ctx.getImageData(0,0,c.width,c.height);
            let data = d.data;

            for (let i = 0; i < data.length; i+=4) {
                data[i] *= 1.1;
                data[i+1] *= 1.1;
                data[i+2] *= 1.1;
            }

            ctx.putImageData(d,0,0);

            aiDownload.href = c.toDataURL();
            aiDownload.download = "enhanced.png";
            aiDownload.innerText = "⬇ Download Enhanced Image";
        };
    };
    r.readAsDataURL(file);
}

// PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
