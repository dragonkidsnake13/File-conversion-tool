<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate File Tools</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
    transition: 0.3s;
}
.light {
    background: #f5f5f5;
    color: black;
}
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    margin: 20px 0;
    border-radius: 15px;
}
button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}
.drop {
    border: 2px dashed #00ffd5;
    padding: 20px;
    margin: 10px 0;
    border-radius: 10px;
}
canvas, img {
    max-width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Ultimate File Tools</h1>
<button onclick="toggleTheme()">🌙 Toggle Theme</button>

<!-- MULTI IMAGE TO PDF -->
<div class="card">
<h2>🖼️ Images → PDF (Multiple)</h2>
<div class="drop" onclick="multiImg.click()">Drop or Click</div>
<input type="file" id="multiImg" multiple hidden accept="image/*">
<button onclick="multiToPDF()">Convert</button>
<div id="previewImgs"></div>
</div>

<!-- PDF TO IMAGE -->
<div class="card">
<h2>📄 PDF → Images</h2>
<div class="drop" onclick="pdfFile.click()">Drop PDF</div>
<input type="file" id="pdfFile" hidden>
<button onclick="pdfToImages()">Convert</button>
<div id="pdfOutput"></div>
<button onclick="downloadAll()">Download All</button>
</div>

<!-- COMPRESS -->
<div class="card">
<h2>📉 Smart Image Compressor</h2>
<input type="file" id="compressFile">
<br>
<label>Quality: <span id="qVal">0.7</span></label>
<input type="range" min="0.1" max="1" step="0.1" value="0.7" id="quality">
<button onclick="compress()">Compress</button>
<br>
<img id="preview">
<a id="dl"></a>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;

// THEME
function toggleTheme() {
    document.body.classList.toggle("light");
}

// MULTI IMAGE TO PDF
function multiToPDF() {
    const files = document.getElementById("multiImg").files;
    const pdf = new jsPDF();

    let count = 0;

    Array.from(files).forEach((file, i) => {
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;

            img.onload = function() {
                if (i > 0) pdf.addPage();
                pdf.addImage(img, 'JPEG', 10, 10, 180, 160);
                count++;

                if (count === files.length) {
                    pdf.save("multi.pdf");
                }
            }
        }
        reader.readAsDataURL(file);
    });
}

// PDF TO IMAGE
let images = [];

function pdfToImages() {
    const file = document.getElementById("pdfFile").files[0];
    const reader = new FileReader();

    reader.onload = function() {
        const arr = new Uint8Array(this.result);

        pdfjsLib.getDocument(arr).promise.then(pdf => {
            document.getElementById("pdfOutput").innerHTML = "";
            images = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    const vp = page.getViewport({ scale: 1.5 });

                    canvas.height = vp.height;
                    canvas.width = vp.width;

                    page.render({ canvasContext: ctx, viewport: vp });

                    document.getElementById("pdfOutput").appendChild(canvas);

                    images.push(canvas.toDataURL("image/png"));
                });
            }
        });
    }
    reader.readAsArrayBuffer(file);
}

// DOWNLOAD ALL
function downloadAll() {
    images.forEach((img, i) => {
        const a = document.createElement("a");
        a.href = img;
        a.download = "page_" + (i+1) + ".png";
        a.click();
    });
}

// COMPRESS
document.getElementById("quality").oninput = e => {
    document.getElementById("qVal").innerText = e.target.value;
}

function compress() {
    const file = document.getElementById("compressFile").files[0];
    const quality = document.getElementById("quality").value;

    const reader = new FileReader();

    reader.onload = function(e) {
        const img = new Image();
        img.src = e.target.result;

        img.onload = function() {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.drawImage(img, 0, 0);

            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);

                document.getElementById("preview").src = url;

                const a = document.getElementById("dl");
                a.href = url;
                a.download = "compressed.jpg";
                a.innerText = "⬇ Download";

            }, "image/jpeg", quality);
        }
    }
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
