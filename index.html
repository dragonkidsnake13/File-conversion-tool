<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="KGtCE4TFXsD6etO7lBzeMIVqlYUsxvetTf28fOMocKc" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate File Tools</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
}
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    margin: 20px 0;
    border-radius: 15px;
}
button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
.drop {
    border: 2px dashed #00ffd5;
    padding: 20px;
    margin: 10px 0;
}
.status {
    font-size: 14px;
    color: #aaa;
}
.ad {
    margin: 20px 0;
    padding: 20px;
    background: #222;
    text-align: center;
}
.badge {
    background: green;
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Ultimate File Tools</h1>
<p class="badge">🔐 100% Private – Files never leave your device</p>

<div class="ad">💰 Ad Space (Paste AdSense here)</div>

<p id="visits"></p>

<!-- MULTI IMAGE TO PDF -->
<div class="card">
<h2>🖼️ Images → PDF</h2>
<input type="file" id="img" multiple>
<button onclick="toPDF()">Convert</button>
<p class="status" id="s1"></p>
</div>

<!-- PDF TO IMAGE -->
<div class="card">
<h2>📄 PDF → Images</h2>
<input type="file" id="pdf">
<button onclick="toImg()">Convert</button>
<div id="out"></div>
</div>

<!-- COMPRESS -->
<div class="card">
<h2>📉 Compress</h2>
<input type="file" id="comp">
<input type="range" id="q" min="0.1" max="1" step="0.1" value="0.7">
<button onclick="compress()">Compress</button>
<a id="dl"></a>
</div>

<!-- AI ENHANCER -->
<div class="card">
<h2>🤖 AI Image Enhancer</h2>
<input type="file" id="ai">
<button onclick="enhance()">Enhance</button>
<br>
<canvas id="aiCanvas"></canvas>
</div>

<div class="ad">💰 Ad Space</div>

</div>

<script>
const { jsPDF } = window.jspdf;

// VISITOR COUNT
let v = localStorage.getItem("visits") || 0;
v++;
localStorage.setItem("visits", v);
document.getElementById("visits").innerText = "👀 Visitors: " + v;

// IMAGE → PDF
function toPDF() {
    let files = document.getElementById("img").files;
    let pdf = new jsPDF();
    let done = 0;

    Array.from(files).forEach((file, i) => {
        let r = new FileReader();
        r.onload = e => {
            let img = new Image();
            img.src = e.target.result;

            img.onload = () => {
                if (i > 0) pdf.addPage();
                pdf.addImage(img, 'JPEG', 10, 10, 180, 160);
                done++;
                if (done === files.length) {
                    pdf.save("file.pdf");
                    document.getElementById("s1").innerText = "Done ✅";
                }
            }
        }
        r.readAsDataURL(file);
    });
}

// PDF → IMAGE
function toImg() {
    let file = document.getElementById("pdf").files[0];
    let r = new FileReader();

    r.onload = function() {
        let arr = new Uint8Array(this.result);

        pdfjsLib.getDocument(arr).promise.then(pdf => {
            document.getElementById("out").innerHTML = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                pdf.getPage(i).then(page => {
                    let c = document.createElement("canvas");
                    let ctx = c.getContext("2d");
                    let vp = page.getViewport({ scale: 1.5 });

                    c.height = vp.height;
                    c.width = vp.width;

                    page.render({ canvasContext: ctx, viewport: vp });
                    document.getElementById("out").appendChild(c);
                });
            }
        });
    }
    r.readAsArrayBuffer(file);
}

// COMPRESS
function compress() {
    let file = document.getElementById("comp").files[0];
    let q = document.getElementById("q").value;

    let r = new FileReader();

    r.onload = e => {
        let img = new Image();
        img.src = e.target.result;

        img.onload = () => {
            let c = document.createElement("canvas");
            let ctx = c.getContext("2d");

            c.width = img.width;
            c.height = img.height;

            ctx.drawImage(img, 0, 0);

            c.toBlob(blob => {
                let url = URL.createObjectURL(blob);
                let a = document.getElementById("dl");

                a.href = url;
                a.download = "compressed.jpg";
                a.innerText = "⬇ Download";
            }, "image/jpeg", q);
        }
    }
    r.readAsDataURL(file);
}

// AI ENHANCE (simple sharpen effect)
function enhance() {
    let file = document.getElementById("ai").files[0];
    let r = new FileReader();

    r.onload = e => {
        let img = new Image();
        img.src = e.target.result;

        img.onload = () => {
            let c = document.getElementById("aiCanvas");
            let ctx = c.getContext("2d");

            c.width = img.width;
            c.height = img.height;

            ctx.drawImage(img, 0, 0);

            let imgData = ctx.getImageData(0,0,c.width,c.height);
            let d = imgData.data;

            for (let i = 0; i < d.length; i+=4) {
                d[i] *= 1.1;     // R
                d[i+1] *= 1.1;   // G
                d[i+2] *= 1.1;   // B
            }

            ctx.putImageData(imgData,0,0);
        }
    }
    r.readAsDataURL(file);
}

// PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
